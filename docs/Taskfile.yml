version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install doc tooling dependencies
    cmds:
      - bun install

  fmt:
    desc: Format all markdown files to 100 char width
    cmds:
      - bunx prettier --write --prose-wrap always --print-width 100 "../**/*.md"

  fmt:check:
    desc: Check markdown formatting
    cmds:
      - bunx prettier --check --prose-wrap always --print-width 100 "../**/*.md"
