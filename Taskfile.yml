version: '3'

includes:
  backend:
    taskfile: ./services/backend/Taskfile.yml
    dir: ./services/backend
  mobile:
    taskfile: ./apps/mobile/Taskfile.yml
    dir: ./apps/mobile
  docs:
    taskfile: ./docs/Taskfile.yml
    dir: ./docs

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: First-time setup (install mobile dependencies)
    cmds:
      - task: mobile:install

  clean:
    desc: Wipe backend database (migrations run on next serve)
    cmds:
      - task: backend:clean

