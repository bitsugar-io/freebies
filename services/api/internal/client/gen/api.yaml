openapi: 3.0.0
info:
  title: Freebie Internal Worker API
  description: Internal endpoints for scheduled worker jobs (called by K8s CronJobs)
  version: 1.0.0

tags:
  - name: worker
    description: Background worker operations

paths:
  /internal/worker/check-triggers:
    post:
      tags: [worker]
      summary: Check game results and create triggered events
      operationId: CheckTriggers
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          description: "Check triggers for a specific date (YYYY-MM-DD), defaults to yesterday"
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Trigger check completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckTriggersResult"
        "400":
          description: Invalid date format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/worker/send-reminders:
    post:
      tags: [worker]
      summary: Send reminder notifications for expiring deals
      operationId: SendReminders
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Reminders sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendRemindersResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    CheckTriggersResult:
      type: object
      required:
        - triggered
        - notified
        - totalEvents
      properties:
        triggered:
          type: integer
          description: Number of events that met trigger conditions
        notified:
          type: integer
          description: Number of push notifications sent
        totalEvents:
          type: integer
          description: Total events checked

    SendRemindersResult:
      type: object
      required:
        - sent
        - failed
        - expiringDeals
      properties:
        sent:
          type: integer
          format: int64
          description: Number of reminder notifications sent
        failed:
          type: integer
          format: int64
          description: Number of failed notification attempts
        expiringDeals:
          type: integer
          description: Number of deals expiring soon

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
