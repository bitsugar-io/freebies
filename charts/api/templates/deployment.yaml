apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "freebie-api.fullname" . }}
  labels:
    {{- include "freebie-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "freebie-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "freebie-api.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--host", "0.0.0.0"]
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: FREEBIE_DATABASE_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ include "freebie-api.fullname" . }}
                  key: database-path
            - name: FREEBIE_WORKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "freebie-api.fullname" . }}
                  key: worker-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
