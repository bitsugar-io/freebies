apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "freebie-scheduler.fullname" . }}-check-triggers
  labels:
    {{- include "freebie-scheduler.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.checkTriggers.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "freebie-scheduler.labels" . | nindent 12 }}
            app.kubernetes.io/component: check-triggers
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - ./scheduler
                - check-triggers
              env:
                - name: SCHEDULER_API_URL
                  value: "http://{{ .Values.api.serviceName }}:{{ .Values.api.port }}"
                - name: SCHEDULER_WORKER_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "freebie-scheduler.fullname" . }}
                      key: worker-secret
